<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator.css">
    <title>Calculator</title>
</head>

<body>
    <div class="main-container">
        <div class="calculator">
            <input type="text" id="expDisplay" class="expression" readonly><br>
            <input type="text" id="resultDisplay" class="result" placeholder="0" readonly>
            <div id="keys" class="keys">
                <button class="acx" onclick="clearDisplay()">Ac</button>
                <button class="acx" onclick="delLastElement()">X</button>
                <button class="assign" onclick="appendToDisplay('/')">/</button>
                <button class="assign" onclick="appendToDisplay('*')">*</button>

                <button class="number" onclick="appendToDisplay('7')">7</button>
                <button class="number" onclick="appendToDisplay('8')">8</button>
                <button class="number" onclick="appendToDisplay('9')">9</button>
                <button class="assign" onclick="appendToDisplay('-')">-</button>

                <button class="number" onclick="appendToDisplay('4')">4</button>
                <button class="number" onclick="appendToDisplay('5')">5</button>
                <button class="number" onclick="appendToDisplay('6')">6</button>
                <button class="btnP assign" onclick="appendToDisplay('+')">+</button>

                <button class="number" onclick="appendToDisplay('1')">1</button>
                <button class="number" onclick="appendToDisplay('2')">2</button>
                <button class="number" onclick="appendToDisplay('3')">3</button>


                <button class="btn0 number" onclick="appendToDisplay('0')">0</button>
                <button class="number" onclick="appendToDisplay('.')">.</button>
                <button class="equal" onclick="calculate()">=</button>

            </div>
        </div>
        <script src="calculator.js"></script>
</body>

</html>
