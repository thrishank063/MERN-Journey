<body>
    <section class="loginPage">
        <div>

        </div>        
    </section>
    <section class="loginPage">
        <div>
            <h1 style="text-align: center;">Number Guessing</h1>

        </div>        
    </section>
    <section class="loginPage">

            <label for="tempValue">Enter Temperature</label>

            <br>
